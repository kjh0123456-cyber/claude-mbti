<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 운세</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #d4a94a;
      --gold-light: #f0cc70;
      --purple-dark: #0e0820;
      --purple-mid: #1a1040;
      --purple-glow: #6b3fa0;
      --card-w: 130px;
      --card-h: 200px;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #2a1060 0%, #0e0820 60%);
      font-family: 'Noto Serif KR', 'Malgun Gothic', serif;
      color: #e8dfc8;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── 별 배경 ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 레이아웃 ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* ── 헤더 ── */
    header { text-align: center; }

    header h1 {
      font-size: 2.2rem;
      letter-spacing: .2em;
      color: var(--gold-light);
      text-shadow: 0 0 24px rgba(212,169,74,.8), 0 0 60px rgba(107,63,160,.6);
    }

    header p {
      margin-top: 8px;
      font-size: .9rem;
      color: #8878aa;
      letter-spacing: .1em;
    }

    /* ── 카드 그리드 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, var(--card-w));
      grid-template-rows: repeat(2, var(--card-h));
      gap: 16px;
      justify-content: center;
    }

    /* ── 카드 ── */
    .card-wrap {
      width: var(--card-w);
      height: var(--card-h);
      perspective: 900px;
      cursor: default;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .8s cubic-bezier(.4,0,.2,1);
      border-radius: 14px;
    }

    .card-inner.flipped { transform: rotateY(180deg); }

    /* 앞·뒷면 공통 */
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── 뒷면 (선택 전) ── */
    .card-back {
      background: linear-gradient(145deg, #1e1040 0%, #2d1a60 50%, #1a0c40 100%);
      border: 1px solid rgba(212,169,74,.25);
      box-shadow: 0 4px 20px rgba(0,0,0,.6), inset 0 0 30px rgba(107,63,160,.15);
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(212,169,74,.18);
      border-radius: 8px;
    }

    .card-back .back-symbol {
      font-size: 2.4rem;
      opacity: .55;
      animation: pulse-symbol 3s ease-in-out infinite;
    }

    @keyframes pulse-symbol {
      0%,100% { opacity: .35; transform: scale(1); }
      50%      { opacity: .7;  transform: scale(1.08); }
    }

    /* ── 앞면 ── */
    .card-front {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, var(--card-bg-a, #1a0c40), var(--card-bg-b, #2d1a60));
      border: 1px solid rgba(212,169,74,.45);
      box-shadow: 0 0 30px var(--card-glow, rgba(107,63,160,.6)), 0 8px 24px rgba(0,0,0,.7);
      padding: 16px 10px;
      gap: 10px;
    }

    .card-front .card-icon { font-size: 2.8rem; filter: drop-shadow(0 0 8px var(--card-glow, #a080ff)); }
    .card-front .card-name { font-size: .78rem; letter-spacing: .12em; color: var(--gold); text-align: center; font-weight: 700; }
    .card-front .card-keyword {
      font-size: .68rem;
      color: #b0a0cc;
      letter-spacing: .06em;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* 선택된 카드 하이라이트 */
    .card-wrap.chosen .card-inner {
      box-shadow: 0 0 0 2px var(--gold), 0 0 40px var(--gold);
    }

    /* 선택 안 된 카드 흐림 */
    .card-wrap.dimmed .card-back {
      opacity: .35;
      transition: opacity .6s;
    }

    /* ── 버튼 ── */
    .draw-btn {
      position: relative;
      background: none;
      border: 1px solid var(--gold);
      border-radius: 50px;
      padding: 14px 52px;
      font-family: inherit;
      font-size: 1.05rem;
      letter-spacing: .18em;
      color: var(--gold-light);
      cursor: pointer;
      overflow: hidden;
      transition: color .3s, box-shadow .3s;
    }

    .draw-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212,169,74,.12), rgba(107,63,160,.15));
      opacity: 0;
      transition: opacity .3s;
    }

    .draw-btn:hover::before { opacity: 1; }
    .draw-btn:hover { box-shadow: 0 0 24px rgba(212,169,74,.4), 0 0 60px rgba(107,63,160,.3); }

    .draw-btn:active { transform: scale(.97); }

    .draw-btn .btn-glow {
      position: absolute;
      inset: -2px;
      background: conic-gradient(from var(--a,0deg), transparent 80%, var(--gold) 100%);
      border-radius: 50px;
      opacity: 0;
      z-index: -1;
      transition: opacity .3s;
    }

    .draw-btn:hover .btn-glow { opacity: .4; animation: spin 2s linear infinite; }

    @keyframes spin { to { --a: 360deg; } }

    /* ── 결과 패널 ── */
    #result {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, rgba(30,16,64,.9), rgba(14,8,32,.95));
      border: 1px solid rgba(212,169,74,.3);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      display: none;
      animation: rise .6s cubic-bezier(.2,1,.3,1);
      box-shadow: 0 0 60px rgba(107,63,160,.3), inset 0 1px 0 rgba(255,255,255,.06);
    }

    #result.show { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .res-icon { font-size: 3.6rem; filter: drop-shadow(0 0 16px var(--res-glow, #a080ff)); margin-bottom: 8px; }
    .res-name  { font-size: 1.1rem; color: var(--gold-light); letter-spacing: .15em; font-weight: 700; margin-bottom: 4px; }
    .res-sub   { font-size: .8rem;  color: #7a6e9a; letter-spacing: .1em; margin-bottom: 20px; }

    .res-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,169,74,.4), transparent);
      margin: 0 0 20px;
    }

    .res-msg {
      font-size: 1rem;
      line-height: 2;
      color: #d8d0e8;
      margin-bottom: 20px;
    }

    .res-tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tag {
      font-size: .75rem;
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid rgba(212,169,74,.3);
      background: rgba(212,169,74,.08);
      color: var(--gold);
      letter-spacing: .08em;
    }

    /* ── 리셋 버튼 ── */
    #resetBtn {
      display: none;
      background: none;
      border: none;
      color: #6a5a8a;
      font-family: inherit;
      font-size: .82rem;
      letter-spacing: .1em;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    #resetBtn:hover { color: #a090c0; }
    #resetBtn.show { display: block; }

    /* ── 반응형 ── */
    @media (max-width: 600px) {
      :root { --card-w: 80px; --card-h: 124px; }
      .card-grid { gap: 10px; }
      .card-back .back-symbol { font-size: 1.6rem; }
      .card-front .card-icon  { font-size: 1.9rem; }
      .card-front .card-name  { font-size: .65rem; }
      .card-front .card-keyword { font-size: .58rem; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page">
  <header>
    <h1>✦ 오늘의 운세 ✦</h1>
    <p id="date-line"></p>
  </header>

  <div class="card-grid" id="cardGrid"></div>

  <button class="draw-btn" id="drawBtn">
    <span class="btn-glow"></span>
    카드를 뽑으세요
  </button>

  <div id="result">
    <div class="res-icon" id="resIcon"></div>
    <div class="res-name" id="resName"></div>
    <div class="res-sub"  id="resSub"></div>
    <div class="res-divider"></div>
    <div class="res-msg"  id="resMsg"></div>
    <div class="res-tags" id="resTags"></div>
  </div>

  <button id="resetBtn">↺ 다시 뽑기</button>
</div>

<script>
/* ─── 별 캔버스 ─────────────────────────────────────── */
// IIFE로 감싸서 전역 변수 오염 방지
(function() {
  const cv = document.getElementById('bg-canvas');
  const ctx = cv.getContext('2d');
  let W, H, stars = [];

  // 창 크기에 맞게 캔버스 해상도 조정
  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }

  // 별 160개 초기화: 위치·반지름·불투명도·깜박임 속도를 무작위 설정
  function init() {
    resize();
    stars = Array.from({ length: 160 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + .3,
      a: Math.random(),
      da: (Math.random() * .008 + .002) * (Math.random() < .5 ? 1 : -1),
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      // 불투명도를 da만큼 증감하고 경계(0.05, 1)에서 방향 반전 → 깜박임 효과
      s.a = Math.max(.05, Math.min(1, s.a + s.da));
      if (s.a <= .05 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  draw();
})();

/* ─── 날짜 ────────────────────────────────────────────── */
document.getElementById('date-line').textContent =
  new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

/* ─── 카드 데이터 ─────────────────────────────────────── */
const CARDS = [
  {
    icon: '🌙', name: '달의 속삭임', keyword: '직감 · 내면',
    bgA: '#0d1a40', bgB: '#1a2d6b', glow: 'rgba(80,120,255,.7)',
    msg: '오늘은 당신의 직감이 어느 때보다 예리합니다. 논리보다 마음이 이끄는 방향을 따르세요. 조용한 시간 속에서 중요한 답을 찾게 될 것입니다.',
    tags: ['#직감', '#명상', '#내면의목소리'],
  },
  {
    icon: '☀️', name: '태양의 축복', keyword: '활력 · 성공',
    bgA: '#3d1a00', bgB: '#6b3000', glow: 'rgba(255,160,30,.8)',
    msg: '밝고 강한 에너지가 당신을 감싸고 있습니다. 오늘 시작한 일은 좋은 결실을 맺을 가능성이 높습니다. 자신감을 갖고 적극적으로 행동하세요.',
    tags: ['#성공', '#활력', '#자신감'],
  },
  {
    icon: '⭐', name: '별의 인도', keyword: '희망 · 여정',
    bgA: '#0d0d3d', bgB: '#1a1a6b', glow: 'rgba(160,140,255,.7)',
    msg: '멀리서 반짝이는 별처럼, 당신의 목표가 조금씩 가까워지고 있습니다. 조급함을 내려놓고 자신의 속도를 믿으세요. 여정 자체가 당신을 성장시킵니다.',
    tags: ['#희망', '#목표', '#성장'],
  },
  {
    icon: '🔮', name: '수정 구슬', keyword: '예지 · 통찰',
    bgA: '#1a0d3d', bgB: '#2d1a6b', glow: 'rgba(180,80,255,.7)',
    msg: '오늘 당신은 평소보다 더 깊이 사물의 본질을 꿰뚫어 볼 수 있습니다. 복잡하게 얽힌 상황의 숨겨진 진실이 서서히 드러날 것입니다.',
    tags: ['#통찰', '#진실', '#예지'],
  },
  {
    icon: '🌿', name: '생명의 새싹', keyword: '치유 · 재생',
    bgA: '#0d2010', bgB: '#1a4020', glow: 'rgba(80,200,100,.6)',
    msg: '지쳐있던 마음과 몸이 새로운 에너지로 채워질 것입니다. 작은 휴식 하나가 큰 회복을 가져옵니다. 자연과 가까이 하는 것이 오늘 특히 도움이 됩니다.',
    tags: ['#치유', '#휴식', '#재생'],
  },
  {
    icon: '🗝️', name: '황금 열쇠', keyword: '기회 · 전환',
    bgA: '#2d1a00', bgB: '#4d3000', glow: 'rgba(255,200,50,.7)',
    msg: '오랫동안 닫혀있던 문이 열릴 기회가 찾아옵니다. 작은 신호도 놓치지 마세요. 용기를 내어 문을 두드리는 사람에게 행운이 찾아옵니다.',
    tags: ['#기회', '#전환', '#용기'],
  },
  {
    icon: '🌊', name: '깊은 파도', keyword: '감정 · 흐름',
    bgA: '#001a2d', bgB: '#003050', glow: 'rgba(30,160,255,.7)',
    msg: '감정의 파도가 크게 일렁이는 날입니다. 억누르지 말고 자연스럽게 흐르도록 두세요. 진솔한 감정 표현이 소중한 관계를 더욱 깊게 만들어 줄 것입니다.',
    tags: ['#감정', '#관계', '#솔직함'],
  },
  {
    icon: '🦋', name: '나비의 변신', keyword: '변화 · 해방',
    bgA: '#1a002d', bgB: '#300050', glow: 'rgba(220,80,255,.7)',
    msg: '껍질을 벗고 새로운 자신으로 거듭날 준비가 되어 있습니다. 변화가 두렵더라도 그 너머엔 더 자유로운 삶이 기다립니다. 오늘, 낡은 것을 내려놓으세요.',
    tags: ['#변화', '#해방', '#새출발'],
  },
];

/* ─── 카드 렌더 ───────────────────────────────────────── */
const grid = document.getElementById('cardGrid');

CARDS.forEach((card, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.dataset.idx = i;

  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back">
        <div class="back-symbol">✦</div>
      </div>
      <div class="card-face card-front"
           style="--card-bg-a:${card.bgA};--card-bg-b:${card.bgB};--card-glow:${card.glow}">
        <div class="card-icon">${card.icon}</div>
        <div class="card-name">${card.name}</div>
        <div class="card-keyword">${card.keyword}</div>
      </div>
    </div>`;

  grid.appendChild(wrap);
});

/* ─── 뽑기 로직 ───────────────────────────────────────── */
const drawBtn  = document.getElementById('drawBtn');
const resetBtn = document.getElementById('resetBtn');
const result   = document.getElementById('result');
let drawn = false;  // 중복 뽑기 방지 플래그

drawBtn.addEventListener('click', () => {
  if (drawn) return;
  drawn = true;

  // 8장 중 무작위로 한 장 선택
  const idx = Math.floor(Math.random() * CARDS.length);
  const card = CARDS[idx];
  const wraps = [...document.querySelectorAll('.card-wrap')];

  // 선택 카드 뒤집기, 나머지 흐림
  wraps.forEach((w, i) => {
    if (i === idx) {
      w.classList.add('chosen');
      // 100ms 딜레이 후 뒤집기 — CSS transition이 시작될 시간을 확보
      setTimeout(() => w.querySelector('.card-inner').classList.add('flipped'), 100);
    } else {
      setTimeout(() => w.classList.add('dimmed'), 200);
    }
  });

  // 카드 뒤집기 애니메이션(800ms) 완료 후 결과 패널 표시
  setTimeout(() => {
    document.getElementById('resIcon').textContent = card.icon;
    document.getElementById('resIcon').style.setProperty('--res-glow', card.glow);
    document.getElementById('resName').textContent = card.name;
    document.getElementById('resSub').textContent  = card.keyword;
    document.getElementById('resMsg').textContent  = card.msg;
    document.getElementById('resTags').innerHTML   = card.tags.map(t => `<span class="tag">${t}</span>`).join('');

    result.classList.add('show');
    resetBtn.classList.add('show');
    drawBtn.style.opacity = '.35';
    drawBtn.style.pointerEvents = 'none';

    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 900);
});

// 카드·결과·버튼 상태를 초기값으로 복원
resetBtn.addEventListener('click', () => {
  drawn = false;
  document.querySelectorAll('.card-wrap').forEach(w => {
    w.classList.remove('chosen', 'dimmed');
    w.querySelector('.card-inner').classList.remove('flipped');
  });
  result.classList.remove('show');
  resetBtn.classList.remove('show');
  drawBtn.style.opacity = '';
  drawBtn.style.pointerEvents = '';
});
</script>
</body>
</html>
